# Install cert-manager first (cluster-admin), then apply this file:
#
#   ./scripts/install-cert-manager.sh
#   kubectl apply -f k8s/nginx-ssl-ing.yaml
#
# Needs an Ingress controller (e.g. ingress-nginx) for the Ingress below to serve HTTPS.
# The Certificate still issues Secret nginx-tls without Ingress.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

---
# Root CA signed by the self-signed issuer (trust this CA in browsers/clients for the lab).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: lab-root-ca
  secretName: lab-root-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca-issuer
spec:
  ca:
    secretName: lab-root-ca

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nginx-tls
  namespace: nginx-app
spec:
  secretName: nginx-tls
  commonName: nginx.local
  dnsNames:
    - nginx.local
    - nginx.nginx-app.svc
    - nginx.nginx-app.svc.cluster.local
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    algorithm: ECDSA
    size: 256
  duration: 2160h    # 90 days
  renewBefore: 360h  # 15 days

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  namespace: nginx-app
  annotations:
    cert-manager.io/cluster-issuer: lab-ca-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nginx.local
      secretName: nginx-tls
  rules:
    - host: nginx.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  name: http
