apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8senforcenamespacerolebindingisolation
  labels:
    oidc.lab/policy: namespace-isolation
spec:
  crd:
    spec:
      names:
        kind: K8sEnforceNamespaceRoleBindingIsolation
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8senforcenamespacerolebindingisolation

        # ServiceAccount subjects must not reference another namespace.
        violation[{"msg": msg}] {
          input.review.kind.kind == "RoleBinding"
          sub := input.review.object.subjects[_]
          sub.kind == "ServiceAccount"
          sa_ns := subject_namespace(sub)
          sa_ns != ""
          sa_ns != input.review.object.metadata.namespace
          msg := sprintf("RoleBinding %v/%v: ServiceAccount %v/%v crosses namespace boundary (RB ns=%v)", [input.review.object.metadata.namespace, input.review.object.metadata.name, sa_ns, sub.name, input.review.object.metadata.namespace])
        }

        subject_namespace(sub) = ns {
          ns := object.get(sub, "namespace", "")
        }
