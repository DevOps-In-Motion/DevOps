# Tier: readonly-viewer — read-only inside the SAME ${NAMESPACE} as developers.
# Different group, same namespace — not a second namespace.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oidc-readonly-viewer
  namespace: ${NAMESPACE}
  labels:
    oidc.lab/tier: readonly-viewer
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - persistentvolumeclaims
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - httproutes
      - referencegrants
      - grpcroutes
      - tlsroutes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - certificaterequests
      - issuers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
