apiVersion: v1
kind: Namespace
metadata:
  name: nginx-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nginx-deployer-role
  namespace: nginx-app
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nginx-deployer-binding
  namespace: nginx-app
subjects:
  - kind: User
    name: nginx-deployer      # must match the CSR's CN exactly
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: nginx-deployer-role
  apiGroup: rbac.authorization.k8s.io