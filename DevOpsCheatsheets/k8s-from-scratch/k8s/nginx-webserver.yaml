# Spread 2 nginx replicas onto worker1 + worker2:
#
#   kubectl taint nodes worker1 workload=nginx:NoSchedule --overwrite
#   kubectl taint nodes worker2 workload=nginx:NoSchedule --overwrite
#
# (controlplane already has node-role.kubernetes.io/control-plane:NoSchedule)
# Apply this manifest after the taints:
#   kubectl apply -f k8s/nginx-webserver.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: nginx-app
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      tolerations:
        - key: workload
          operator: Equal
          value: nginx
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: nginx
              topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: nginx-app
  labels:
    app: nginx
spec:
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
