apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  calicoNetwork:
    # Pin to Vagrant host-only NIC — never kube-ipvs0 (MetalLB VIP 192.168.56.200).
    nodeAddressAutodetectionV4:
      interface: eth1
    ipPools:
    - name: default-ipv4-ippool
      blockSize: 26
      cidr: 10.244.0.0/16
      encapsulation: VXLANCrossSubnet
      natOutgoing: Enabled
      nodeSelector: all()
