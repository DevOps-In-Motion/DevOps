# Namespace + RBAC for nginx-deployer (full control in nginx-app only).

apiVersion: v1
kind: Namespace
metadata:
  name: nginx-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nginx-deployer-role
  namespace: nginx-app
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nginx-deployer-binding
  namespace: nginx-app
subjects:
  - kind: User
    name: nginx-deployer
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: nginx-deployer-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nginx-deployer-cluster-read
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nginx-deployer-cluster-read
subjects:
  - kind: User
    name: nginx-deployer
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: nginx-deployer-cluster-read
  apiGroup: rbac.authorization.k8s.io
