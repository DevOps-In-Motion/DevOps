---
# AI workers — ai-workers-secret
# Must match: docs/.../secrets/secrets-2-be-created-complete.txt (Secret: ai-workers-secret)
# objectName/secretName: ai-workers-secret
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ai-workers-secrets-provider
  namespace: kovr
spec:
  provider: aws
  parameters:
    region: us-iso-east-1
    objects: |
      - objectName: "ai-workers-secret"
        objectType: "secretsmanager"
        jmesPath:
          - path: "ANTHROPIC_API_KEY"
            objectAlias: "ANTHROPIC_API_KEY"
          - path: "AWS_ACCOUNT_ID"
            objectAlias: "AWS_ACCOUNT_ID"
          - path: "AWS_BEDROCK_REGION"
            objectAlias: "AWS_BEDROCK_REGION"
          - path: "AWS_REGION"
            objectAlias: "AWS_REGION"
          - path: "AWS_DOMAIN"
            objectAlias: "AWS_DOMAIN"
          - path: "DB_HOST"
            objectAlias: "DB_HOST"
          - path: "DB_NAME"
            objectAlias: "DB_NAME"
          - path: "DB_PASSWORD"
            objectAlias: "DB_PASSWORD"
          - path: "DB_PORT"
            objectAlias: "DB_PORT"
          - path: "DB_SSL_MODE"
            objectAlias: "DB_SSL_MODE"
          - path: "DB_USER"
            objectAlias: "DB_USER"
          - path: "EMBEDDING_BATCH_SIZE"
            objectAlias: "EMBEDDING_BATCH_SIZE"
          - path: "EMBEDDING_CHUNK_FETCH_BATCH_SIZE"
            objectAlias: "EMBEDDING_CHUNK_FETCH_BATCH_SIZE"
          - path: "EMBEDDING_MODEL"
            objectAlias: "EMBEDDING_MODEL"
          - path: "ENABLE_EMBEDDINGS"
            objectAlias: "ENABLE_EMBEDDINGS"
          - path: "ENABLE_FILE_IO"
            objectAlias: "ENABLE_FILE_IO"
          - path: "ENABLE_LLM"
            objectAlias: "ENABLE_LLM"
          - path: "ENVIRONMENT"
            objectAlias: "ENVIRONMENT"
          - path: "GOOGLE_API_KEY"
            objectAlias: "GOOGLE_API_KEY"
          - path: "LANGFUSE_ENABLED"
            objectAlias: "LANGFUSE_ENABLED"
          - path: "LANGFUSE_HOST"
            objectAlias: "LANGFUSE_HOST"
          - path: "LANGFUSE_PUBLIC_KEY"
            objectAlias: "LANGFUSE_PUBLIC_KEY"
          - path: "LANGFUSE_SECRET_KEY"
            objectAlias: "LANGFUSE_SECRET_KEY"
          - path: "LLM_GATEWAY_BASE_URL"
            objectAlias: "LLM_GATEWAY_BASE_URL"
          - path: "LLM_MODEL"
            objectAlias: "LLM_MODEL"
          - path: "LOG_FORMAT"
            objectAlias: "LOG_FORMAT"
          - path: "LOG_LEVEL"
            objectAlias: "LOG_LEVEL"
          - path: "MAX_CONCURRENCY"
            objectAlias: "MAX_CONCURRENCY"
          - path: "NEWRELIC_ENABLED"
            objectAlias: "NEWRELIC_ENABLED"
          - path: "NEWRELIC_ENVIRONMENT"
            objectAlias: "NEWRELIC_ENVIRONMENT"
          - path: "NEW_RELIC_APP_NAME"
            objectAlias: "NEW_RELIC_APP_NAME"
          - path: "NEW_RELIC_LICENSE_KEY"
            objectAlias: "NEW_RELIC_LICENSE_KEY"
          - path: "OMP_NUM_THREADS"
            objectAlias: "OMP_NUM_THREADS"
          - path: "QUEUE_MAX_MESSAGES"
            objectAlias: "QUEUE_MAX_MESSAGES"
          - path: "QUEUE_MAX_RECEIVE_COUNT"
            objectAlias: "QUEUE_MAX_RECEIVE_COUNT"
          - path: "QUEUE_VISIBILITY_TIMEOUT"
            objectAlias: "QUEUE_VISIBILITY_TIMEOUT"
          - path: "QUEUE_WAIT_TIME_SECONDS"
            objectAlias: "QUEUE_WAIT_TIME_SECONDS"
          - path: "S3_BUCKET"
            objectAlias: "S3_BUCKET"
          - path: "S3_REGION"
            objectAlias: "S3_REGION"

  secretObjects:
  - secretName: ai-workers-secret
    type: Opaque
    data:
    - { objectName: ANTHROPIC_API_KEY, key: ANTHROPIC_API_KEY }
    - { objectName: AWS_ACCOUNT_ID, key: AWS_ACCOUNT_ID }
    - { objectName: AWS_BEDROCK_REGION, key: AWS_BEDROCK_REGION }
    - { objectName: AWS_REGION, key: AWS_REGION }
    - { objectName: AWS_DOMAIN, key: AWS_DOMAIN }
