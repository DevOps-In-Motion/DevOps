    - { objectName: NEW_RELIC_LICENSE_KEY, key: NEW_RELIC_LICENSE_KEY }
    - { objectName: OMP_NUM_THREADS, key: OMP_NUM_THREADS }
    - { objectName: QUEUE_MAX_MESSAGES, key: QUEUE_MAX_MESSAGES }
    - { objectName: QUEUE_MAX_RECEIVE_COUNT, key: QUEUE_MAX_RECEIVE_COUNT }
    - { objectName: QUEUE_VISIBILITY_TIMEOUT, key: QUEUE_VISIBILITY_TIMEOUT }
    - { objectName: QUEUE_WAIT_TIME_SECONDS, key: QUEUE_WAIT_TIME_SECONDS }
    - { objectName: S3_BUCKET, key: S3_BUCKET }
    - { objectName: S3_REGION, key: S3_REGION }
