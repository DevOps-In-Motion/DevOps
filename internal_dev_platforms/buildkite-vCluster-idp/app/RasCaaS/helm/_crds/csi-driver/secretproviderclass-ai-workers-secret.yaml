    - { objectName: GOOGLE_API_KEY, key: GOOGLE_API_KEY }
    - { objectName: LANGFUSE_ENABLED, key: LANGFUSE_ENABLED }
    - { objectName: LANGFUSE_HOST, key: LANGFUSE_HOST }
    - { objectName: LANGFUSE_PUBLIC_KEY, key: LANGFUSE_PUBLIC_KEY }
    - { objectName: LANGFUSE_SECRET_KEY, key: LANGFUSE_SECRET_KEY }
    - { objectName: LLM_GATEWAY_BASE_URL, key: LLM_GATEWAY_BASE_URL }
    - { objectName: LLM_MODEL, key: LLM_MODEL }
    - { objectName: LOG_FORMAT, key: LOG_FORMAT }
    - { objectName: LOG_LEVEL, key: LOG_LEVEL }
    - { objectName: MAX_CONCURRENCY, key: MAX_CONCURRENCY }
    - { objectName: NEWRELIC_ENABLED, key: NEWRELIC_ENABLED }
    - { objectName: NEWRELIC_ENVIRONMENT, key: NEWRELIC_ENVIRONMENT }
