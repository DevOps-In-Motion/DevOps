---
# Resource collector — prod-kovr-resource-collector-secrets
# Must match: kovr-resource-collector/values.yaml → secretProviderClass: collector-secrets-provider, secrets.prod-kovr-resource-collector-secrets keys.
# AWS Secrets Manager secret id: prod-kovr-resource-collector-secrets (region below). IRSA: secretsmanager:GetSecretValue on that secret.
# If the SM payload is JSON, jmesPath below is required: without it, synced K8s Secret keys can each contain the entire JSON string.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: collector-secrets-provider
  namespace: kovr
spec:
  provider: aws
  parameters:
    region: us-iso-east-1
    objects: |
      - objectName: "prod-kovr-resource-collector-secrets"
        objectType: "secretsmanager"
        jmesPath:
          - path: "AWS_REGION"
            objectAlias: "AWS_REGION"
          - path: "CONNECTOR_QUEUE"
            objectAlias: "CONNECTOR_QUEUE"
          - path: "CONMON_RESULTS_UPDATE_QUEUE_URL"
            objectAlias: "CONMON_RESULTS_UPDATE_QUEUE_URL"
          - path: "DB_HOST"
            objectAlias: "DB_HOST"
          - path: "DB_NAME"
            objectAlias: "DB_NAME"
          - path: "DB_PASSWORD"
            objectAlias: "DB_PASSWORD"
          - path: "DB_PORT"
            objectAlias: "DB_PORT"
          - path: "DB_USER"
            objectAlias: "DB_USER"
          - path: "ENV"
            objectAlias: "ENV"
          - path: "KOVR_AWS_ACCESS_KEY_ID"
            objectAlias: "KOVR_AWS_ACCESS_KEY_ID"
          - path: "KOVR_AWS_SECRET_ACCESS_KEY"
            objectAlias: "KOVR_AWS_SECRET_ACCESS_KEY"

  secretObjects:
  - secretName: prod-kovr-resource-collector-secrets
    type: Opaque
    data:
    - objectName: AWS_REGION
      key: AWS_REGION
    - objectName: CONNECTOR_QUEUE
      key: CONNECTOR_QUEUE
    - objectName: CONMON_RESULTS_UPDATE_QUEUE_URL
      key: CONMON_RESULTS_UPDATE_QUEUE_URL
    - objectName: DB_HOST
      key: DB_HOST
    - objectName: DB_NAME
      key: DB_NAME
    - objectName: DB_PASSWORD
      key: DB_PASSWORD
    - objectName: DB_PORT
      key: DB_PORT
    - objectName: DB_USER
      key: DB_USER
    - objectName: ENV
      key: ENV
    - objectName: KOVR_AWS_ACCESS_KEY_ID
      key: KOVR_AWS_ACCESS_KEY_ID
    - objectName: KOVR_AWS_SECRET_ACCESS_KEY
      key: KOVR_AWS_SECRET_ACCESS_KEY

