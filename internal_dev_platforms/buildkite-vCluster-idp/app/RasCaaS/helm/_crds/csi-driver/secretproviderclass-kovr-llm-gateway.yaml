---
# LLM gateway — llm-gateway-secret
# Must match: install-values / llm-gateway (CSI volume → llm-gateway-secrets-provider) and
#   docs/.../secrets/secrets-2-be-created-complete.txt block "Secret: llm-gateway-secret".
# AWS Secrets Manager id: llm-gateway-secret. MODELS_CONFIG in SM is the full YAML string (not @file).
# IRSA: secretsmanager:GetSecretValue on that secret.
# If the SM payload is JSON, jmesPath below is required: without it, synced K8s Secret keys can each
#   contain the entire JSON string.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: llm-gateway-secrets-provider
  namespace: kovr
spec:
  provider: aws
  parameters:
    region: us-iso-east-1
    objects: |
      - objectName: "llm-gateway-secret"
        objectType: "secretsmanager"
        jmesPath:
          - path: "CACHE_TYPE"
            objectAlias: "CACHE_TYPE"
          - path: "CACHE_URL"
            objectAlias: "CACHE_URL"
          - path: "DB_HOST"
            objectAlias: "DB_HOST"
          - path: "DB_NAME"
            objectAlias: "DB_NAME"
          - path: "DB_PASSWORD"
            objectAlias: "DB_PASSWORD"
          - path: "DB_USER"
            objectAlias: "DB_USER"
          - path: "DEFAULT_USECASE_TOKENS"
            objectAlias: "DEFAULT_USECASE_TOKENS"
          - path: "ENVIRONMENT"
            objectAlias: "ENVIRONMENT"
          - path: "GEMINI_API_KEY"
            objectAlias: "GEMINI_API_KEY"
          - path: "LANGFUSE_HOST"
            objectAlias: "LANGFUSE_HOST"
          - path: "LANGFUSE_PUBLIC_KEY"
            objectAlias: "LANGFUSE_PUBLIC_KEY"
          - path: "LANGFUSE_SECRET_KEY"
            objectAlias: "LANGFUSE_SECRET_KEY"
          - path: "LOG_LEVEL"
            objectAlias: "LOG_LEVEL"
          - path: "MODELS_CONFIG"
            objectAlias: "MODELS_CONFIG"

  secretObjects:
  - secretName: llm-gateway-secret
    type: Opaque
    data:
    - objectName: CACHE_TYPE
      key: CACHE_TYPE
    - objectName: CACHE_URL
      key: CACHE_URL
    - objectName: DB_HOST
      key: DB_HOST
    - objectName: DB_NAME
      key: DB_NAME
    - objectName: DB_PASSWORD
      key: DB_PASSWORD
    - objectName: DB_USER
      key: DB_USER
    - objectName: DEFAULT_USECASE_TOKENS
      key: DEFAULT_USECASE_TOKENS
    - objectName: ENVIRONMENT
      key: ENVIRONMENT
    - objectName: GEMINI_API_KEY
      key: GEMINI_API_KEY
    - objectName: LANGFUSE_HOST
      key: LANGFUSE_HOST
    - objectName: LANGFUSE_PUBLIC_KEY
      key: LANGFUSE_PUBLIC_KEY
    - objectName: LANGFUSE_SECRET_KEY
      key: LANGFUSE_SECRET_KEY
    - objectName: LOG_LEVEL
      key: LOG_LEVEL
    - objectName: MODELS_CONFIG
      key: MODELS_CONFIG
