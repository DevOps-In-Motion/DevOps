---
# Ask AI / ai-workers — kovr-askai-secret-local
# Must match: ai-workers & ai-app-server values.yaml → secretProviderClass: askai-secrets-provider, secrets.kovr-askai-secret-local keys.
# AWS Secrets Manager secret id: kovr-askai-secret-local (region below). IRSA: secretsmanager:GetSecretValue on that secret.
# If the SM payload is JSON, jmesPath below is required: without it, synced K8s Secret keys can each contain the entire JSON string.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: askai-secrets-provider
  namespace: kovr
spec:
  provider: aws
  parameters:
    region: us-iso-east-1
    objects: |
      - objectName: "kovr-askai-secret-local"
        objectType: "secretsmanager"
        jmesPath:
          - path: "AWS_DEFAULT_MODEL"
            objectAlias: "AWS_DEFAULT_MODEL"
          - path: "AWS_PRO_MODEL"
            objectAlias: "AWS_PRO_MODEL"
          - path: "AWS_REGION"
            objectAlias: "AWS_REGION"
          - path: "BACKEND_QUEUE"
            objectAlias: "BACKEND_QUEUE"
          - path: "BACKEND_URL"
            objectAlias: "BACKEND_URL"
          - path: "BATCH_SIZE"
            objectAlias: "BATCH_SIZE"
          - path: "BEDROCK_MODEL_ID"
            objectAlias: "BEDROCK_MODEL_ID"
          - path: "CLAUDE_MODEL"
            objectAlias: "CLAUDE_MODEL"
          - path: "DB_HOST"
            objectAlias: "DB_HOST"
          - path: "DB_NAME"
            objectAlias: "DB_NAME"
          - path: "DB_PASSWORD"
            objectAlias: "DB_PASSWORD"
          - path: "DB_PORT"
            objectAlias: "DB_PORT"
          - path: "DB_USER"
            objectAlias: "DB_USER"
          - path: "DS_QUEUE"
            objectAlias: "DS_QUEUE"
          - path: "EMBEDDING_MODEL"
            objectAlias: "EMBEDDING_MODEL"
          - path: "LLM_PROVIDER"
            objectAlias: "LLM_PROVIDER"
          - path: "LOG_LEVEL"
            objectAlias: "LOG_LEVEL"
          - path: "MAX_RECOMMENDATIONS_PER_GROUP"
            objectAlias: "MAX_RECOMMENDATIONS_PER_GROUP"
          - path: "MAX_RETRIES"
            objectAlias: "MAX_RETRIES"
          - path: "REGION"
            objectAlias: "REGION"
          - path: "S3_BUCKET"
            objectAlias: "S3_BUCKET"
          - path: "SIMILARITY_THRESHOLD"
            objectAlias: "SIMILARITY_THRESHOLD"

  secretObjects:
  - secretName: kovr-askai-secret-local
    type: Opaque
    data:
    - objectName: AWS_DEFAULT_MODEL
      key: AWS_DEFAULT_MODEL
    - objectName: AWS_PRO_MODEL
      key: AWS_PRO_MODEL
    - objectName: AWS_REGION
      key: AWS_REGION
    - objectName: BACKEND_QUEUE
      key: BACKEND_QUEUE
    - objectName: BACKEND_URL
      key: BACKEND_URL
    - objectName: BATCH_SIZE
      key: BATCH_SIZE
    - objectName: BEDROCK_MODEL_ID
      key: BEDROCK_MODEL_ID
    - objectName: CLAUDE_MODEL
      key: CLAUDE_MODEL
    - objectName: DB_HOST
      key: DB_HOST
    - objectName: DB_NAME
      key: DB_NAME
    - objectName: DB_PASSWORD
      key: DB_PASSWORD
    - objectName: DB_PORT
      key: DB_PORT
    - objectName: DB_USER
      key: DB_USER
    - objectName: DS_QUEUE
      key: DS_QUEUE
    - objectName: EMBEDDING_MODEL
      key: EMBEDDING_MODEL
    - objectName: LLM_PROVIDER
      key: LLM_PROVIDER
    - objectName: LOG_LEVEL
      key: LOG_LEVEL
    - objectName: MAX_RECOMMENDATIONS_PER_GROUP
      key: MAX_RECOMMENDATIONS_PER_GROUP
    - objectName: MAX_RETRIES
      key: MAX_RETRIES
    - objectName: REGION
      key: REGION
    - objectName: S3_BUCKET
      key: S3_BUCKET
    - objectName: SIMILARITY_THRESHOLD
      key: SIMILARITY_THRESHOLD

