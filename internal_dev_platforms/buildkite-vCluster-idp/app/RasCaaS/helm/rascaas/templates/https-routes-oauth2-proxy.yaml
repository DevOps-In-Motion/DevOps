{{- if .Values.gateway.enabled }}
# Edge routes — HTTP→HTTPS redirect and authenticated UI via oauth2-proxy.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.oauth2proxy.name }}-https-redirect
  namespace: {{ include "rascaas.namespace" . }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "rascaas.gateway.name" . }}
      namespace: {{ include "rascaas.gateway.namespace" . }}
      sectionName: http
{{- if .Values.gateway.hostname }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
{{- end }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- if .Values.gateway.hostname }}
            hostname: {{ .Values.gateway.hostname | quote }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.oauth2proxy.name }}-frontend-route
  namespace: {{ include "rascaas.namespace" . }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "rascaas.gateway.name" . }}
      namespace: {{ include "rascaas.gateway.namespace" . }}
      sectionName: https
{{- if .Values.gateway.hostname }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
{{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.oauth2proxy.name }}
          port: 80
{{- end }}
